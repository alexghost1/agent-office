version: '3.9'
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports: ["8000:8000"]
    volumes:
      - ./data/vectors:/chroma/chroma
    restart: unless-stopped

  agent-office:
    build: .
    env_file: .env
    volumes:
      - .:/app
    depends_on: [redis, chromadb]
    restart: unless-stopped
    command: python main.py
