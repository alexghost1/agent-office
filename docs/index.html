<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JARVIS">
<meta name="theme-color" content="#05070d">
<link rel="manifest" href="manifest.json">
<title>JARVIS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html, body {
  height:100%; width:100%;
  background:#05070d;
  color:#e0e6f0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden;
  position:fixed;
}

/* ── SETUP ─────────────────────────────────────────── */
#setup {
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:40px 32px; gap:20px; background:#05070d; z-index:99;
}
#setup .logo { font-size:56px; line-height:1; }
#setup h1 {
  font-size:28px; font-weight:900; letter-spacing:4px;
  background:linear-gradient(90deg,#00d4ff,#7b2ff7);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
#setup p { font-size:14px; color:#6b7280; text-align:center; line-height:1.7; max-width:300px; }
#key-input {
  width:100%; padding:16px; border-radius:14px;
  background:#0d1220; border:1px solid #1f2937;
  color:#e0e6f0; font-size:15px; text-align:center; letter-spacing:1px;
}
#key-input:focus { outline:none; border-color:#00d4ff; }
#btn-go {
  width:100%; padding:18px; border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#7b2ff7);
  border:none; color:#fff; font-size:17px; font-weight:800;
  cursor:pointer; letter-spacing:1px;
}
#setup-err { font-size:12px; color:#f87171; min-height:14px; }

/* ── MAIN APP ──────────────────────────────────────── */
#app {
  display:none; height:100%;
  flex-direction:column; align-items:center; justify-content:space-between;
  padding: env(safe-area-inset-top, 16px) 24px env(safe-area-inset-bottom, 24px);
}

/* Top bar */
.topbar {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding-top:8px;
}
.topbar-title {
  font-size:15px; font-weight:800; letter-spacing:3px;
  background:linear-gradient(90deg,#00d4ff,#7b2ff7);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.topbar-btns { display:flex; gap:14px; }
.icon-btn { background:none; border:none; font-size:22px; cursor:pointer; opacity:.6; padding:4px; }
.icon-btn.on { opacity:1; }

/* Status text */
#status-text {
  font-size:15px; color:#6b7280; text-align:center;
  min-height:24px; transition:all .3s; padding:0 20px; line-height:1.5;
  max-width:320px;
}
#status-text.speaking { color:#00d4ff; }
#status-text.listening { color:#f87171; }

/* The orb */
#orb-zone { display:flex; flex-direction:column; align-items:center; gap:20px; }
#orb {
  width:160px; height:160px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #1a2a50, #05070d);
  border:2px solid #1f2937;
  display:flex; align-items:center; justify-content:center;
  font-size:60px;
  cursor:pointer; position:relative;
  transition:all .3s;
  box-shadow: 0 0 40px rgba(0,212,255,.05);
}
#orb::after {
  content:'';
  position:absolute; inset:-12px; border-radius:50%;
  border:1.5px solid rgba(0,212,255,.12);
  transition:all .3s;
}
#orb::before {
  content:'';
  position:absolute; inset:-24px; border-radius:50%;
  border:1px solid rgba(0,212,255,.06);
  transition:all .3s;
}
#orb.idle:hover { box-shadow:0 0 50px rgba(0,212,255,.12); }

#orb.listening {
  background:radial-gradient(circle at 35% 35%, #2a0a0a, #1a0505);
  border-color:#f87171;
  box-shadow:0 0 0 0 rgba(248,113,113,.5);
  animation:listen-pulse 1.1s ease-in-out infinite;
}
#orb.listening::after  { border-color:rgba(248,113,113,.3); animation:ring1 1.1s ease-out infinite; }
#orb.listening::before { border-color:rgba(248,113,113,.15); animation:ring2 1.1s ease-out infinite .2s; }

#orb.speaking {
  background:radial-gradient(circle at 35% 35%, #0a1a30, #051020);
  border-color:#00d4ff;
  box-shadow:0 0 0 0 rgba(0,212,255,.4);
  animation:speak-pulse 1.4s ease-in-out infinite;
}
#orb.speaking::after  { border-color:rgba(0,212,255,.3); animation:ring1 1.4s ease-out infinite; }
#orb.speaking::before { border-color:rgba(0,212,255,.15); animation:ring2 1.4s ease-out infinite .3s; }

@keyframes listen-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.5)} 50%{box-shadow:0 0 0 20px rgba(248,113,113,0)} }
@keyframes speak-pulse  { 0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.4)}   50%{box-shadow:0 0 0 20px rgba(0,212,255,0)}   }
@keyframes ring1 { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(1.35);opacity:0} }
@keyframes ring2 { 0%{transform:scale(1);opacity:.5} 100%{transform:scale(1.6); opacity:0} }

#orb-label { font-size:13px; color:#4b5563; letter-spacing:.5px; }

/* Last reply bubble */
#reply-bubble {
  background:#0d1220; border:1px solid #1f2937; border-radius:16px;
  padding:14px 18px; font-size:15px; line-height:1.6;
  max-width:340px; width:100%; text-align:center;
  min-height:54px; display:flex; align-items:center; justify-content:center;
  color:#94a3b8; transition:all .3s;
}
#reply-bubble.active { color:#e0e6f0; border-color:#1e3a5f; }

/* Text fallback */
#text-zone { display:flex; gap:8px; width:100%; max-width:360px; }
#text-in {
  flex:1; padding:13px 16px; border-radius:12px;
  background:#0d1220; border:1px solid #1f2937;
  color:#e0e6f0; font-size:15px;
}
#text-in:focus { outline:none; border-color:#00d4ff; }
#btn-send {
  padding:13px 20px; border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#7b2ff7);
  border:none; color:#fff; font-weight:700; font-size:16px; cursor:pointer;
}
#no-speech { font-size:12px; color:#f87171; display:none; text-align:center; }

/* Voice picker modal */
#voice-modal {
  display:none; position:fixed; inset:0; background:rgba(5,7,13,.92);
  z-index:50; align-items:center; justify-content:center; padding:24px;
}
#voice-modal.show { display:flex; }
#voice-modal-box {
  background:#0d1220; border:1px solid #1f2937; border-radius:16px;
  padding:24px; width:100%; max-width:340px; display:flex; flex-direction:column; gap:14px;
}
#voice-modal-box h3 { font-size:16px; letter-spacing:1px; }
#voice-select {
  width:100%; padding:12px; border-radius:10px;
  background:#05070d; border:1px solid #1f2937; color:#e0e6f0; font-size:14px;
}
.voice-modal-btns { display:flex; gap:10px; }
.voice-modal-btns button {
  flex:1; padding:12px; border-radius:10px; border:none; font-weight:700; cursor:pointer; font-size:14px;
}
#btn-voice-test { background:#1f2937; color:#e0e6f0; }
#btn-voice-save { background:linear-gradient(135deg,#2563eb,#7b2ff7); color:#fff; }
#voice-pitch-row { display:flex; align-items:center; gap:10px; font-size:13px; color:#94a3b8; }
#voice-pitch-row input { flex:1; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo">🧠</div>
  <h1>JARVIS</h1>
  <p>Introduce tu Anthropic API Key para activar a JARVIS. Se guarda solo en este dispositivo.</p>
  <input type="password" id="key-input" placeholder="sk-ant-api03-..." autocomplete="off" inputmode="text">
  <div id="setup-err"></div>
  <button id="btn-go">Activar</button>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <span class="topbar-title">JARVIS</span>
    <div class="topbar-btns">
      <button class="icon-btn on" id="btn-spk" title="Voz">🔊</button>
      <button class="icon-btn"    id="btn-voice" title="Elegir voz">🎙️</button>
      <button class="icon-btn"    id="btn-key" title="Key">🔑</button>
    </div>
  </div>

  <div id="status-text">Pulsa el orbe y habla</div>

  <div id="orb-zone">
    <div id="orb" class="idle">🎤</div>
    <div id="orb-label">toca para hablar</div>
    <div id="no-speech">Usa el texto — tu navegador no soporta voz</div>
  </div>

  <div id="reply-bubble">Las respuestas de JARVIS aparecerán aquí</div>

  <div id="text-zone">
    <input type="text" id="text-in" placeholder="Escribe si prefieres..." autocomplete="off">
    <button id="btn-send">→</button>
  </div>
</div>

<!-- VOICE PICKER -->
<div id="voice-modal">
  <div id="voice-modal-box">
    <h3>Voz de JARVIS</h3>
    <select id="voice-select"></select>
    <div id="voice-pitch-row">
      <span>Tono</span>
      <input type="range" id="voice-pitch" min="0.6" max="1.2" step="0.05">
      <span id="voice-pitch-val"></span>
    </div>
    <div class="voice-modal-btns">
      <button id="btn-voice-test">▶ Probar</button>
      <button id="btn-voice-save">Guardar</button>
    </div>
  </div>
</div>

<script>
if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('./sw.js').catch(() => {});

const SYSTEM_BASE = `Eres JARVIS, el asistente personal de Alexandre García. Eres directo, eficiente y cercano. Hablas siempre en español. Responde de forma breve y oral — tus respuestas se leen en voz alta, así que evita listas con viñetas, asteriscos o texto largo. Máximo 3 frases salvo que Alexandre pida más detalle. Eres su brazo derecho digital.`;

let personalContext = '';
async function loadContext() {
  try {
    const r = await fetch('./context.md', { cache: 'no-store' });
    if (r.ok) personalContext = (await r.text()).trim();
  } catch(_) {}
}
loadContext();

let apiKey = localStorage.getItem('jarvis_key') || '';
let ttsOn = true;
let isListening = false;
let history = JSON.parse(localStorage.getItem('jarvis_hist') || '[]');
let savedVoiceName = localStorage.getItem('jarvis_voice_name') || '';
let savedPitch = parseFloat(localStorage.getItem('jarvis_voice_pitch') || '0.85');

const $ = id => document.getElementById(id);
const orb = $('orb');

// ── Setup ────────────────────────────────────────────
function launch() {
  $('setup').style.display = 'none';
  $('app').style.display   = 'flex';
}
$('btn-go').addEventListener('click', () => {
  const k = $('key-input').value.trim();
  if (!k.startsWith('sk-ant-')) { $('setup-err').textContent = 'Debe empezar por sk-ant-…'; return; }
  apiKey = k; localStorage.setItem('jarvis_key', k); launch();
});
$('key-input').addEventListener('keydown', e => { if(e.key==='Enter') $('btn-go').click(); });
$('btn-key').addEventListener('click', () => {
  localStorage.removeItem('jarvis_key');
  $('setup').style.display = 'flex'; $('app').style.display = 'none';
  $('key-input').value = ''; $('setup-err').textContent = '';
});
if (apiKey) launch();

// ── State helpers ────────────────────────────────────
function setStatus(msg, cls) {
  const s = $('status-text');
  s.textContent = msg; s.className = cls || '';
}
function setReply(text) {
  const r = $('reply-bubble');
  r.textContent = text; r.className = text ? 'active' : '';
}
function saveHist() { localStorage.setItem('jarvis_hist', JSON.stringify(history.slice(-40))); }

// ── Claude API ───────────────────────────────────────
async function ask(text) {
  history.push({role:'user', content: text}); saveHist();
  setStatus('Pensando…');
  orb.className = '';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 512,
        system: SYSTEM_BASE + (personalContext ? `\n\n--- CONTEXTO PERSONAL DE ALEXANDRE ---\n${personalContext}` : ''),
        messages: history,
      }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content?.[0]?.text || '…';
    history.push({role:'assistant', content: reply}); saveHist();
    setReply(reply);
    if (ttsOn) speak(reply); else setStatus('Pulsa el orbe y habla');
  } catch(err) {
    setStatus('⚠️ ' + err.message); orb.className = 'idle';
  }
}

// ── TTS ──────────────────────────────────────────────
let currentUtterance = null; // evita que el GC de Android corte el audio a mitad
let voiceWaitTimer = null;

function pickVoice() {
  const vv = window.speechSynthesis.getVoices().filter(v=>v.lang.toLowerCase().startsWith('es'));
  if (savedVoiceName) {
    const v = vv.find(v=>v.name===savedVoiceName);
    if (v) return v;
  }
  return vv.find(v=>v.localService) || vv[0];
}
function speakNow(text, opts = {}) {
  const utt = new SpeechSynthesisUtterance(text.replace(/[*#_~`•]/g,''));
  utt.lang = 'es-ES'; utt.rate = 1.0; utt.pitch = opts.pitch ?? savedPitch;
  const v = opts.voice || pickVoice();
  if (v) utt.voice = v;
  utt.onstart = () => { orb.className = 'speaking'; setStatus('JARVIS está hablando…', 'speaking'); };
  utt.onend   = () => { orb.className = 'idle'; setStatus('Pulsa el orbe y habla'); currentUtterance = null; };
  utt.onerror = () => { orb.className = 'idle'; setStatus('Pulsa el orbe y habla'); currentUtterance = null; };
  currentUtterance = utt; // referencia viva mientras dura el habla
  window.speechSynthesis.speak(utt);
}
function speak(text, opts = {}) {
  if (!window.speechSynthesis) return;
  clearTimeout(voiceWaitTimer);
  // Android suele "congelar" speechSynthesis tras bloquear pantalla/cambiar de app
  window.speechSynthesis.resume();
  if (window.speechSynthesis.speaking || window.speechSynthesis.pending) window.speechSynthesis.cancel();

  const vv = window.speechSynthesis.getVoices().filter(v=>v.lang.toLowerCase().startsWith('es'));
  if (vv.length === 0 && !opts.voice) {
    // Las voces aún no han cargado — reintentar hasta 1.5s
    let tries = 0;
    voiceWaitTimer = setInterval(() => {
      tries++;
      const ready = window.speechSynthesis.getVoices().filter(v=>v.lang.toLowerCase().startsWith('es'));
      if (ready.length > 0 || tries > 10) {
        clearInterval(voiceWaitTimer);
        speakNow(text, opts);
      }
    }, 150);
    return;
  }
  speakNow(text, opts);
}
$('btn-spk').addEventListener('click', () => {
  ttsOn = !ttsOn;
  $('btn-spk').classList.toggle('on', ttsOn);
  $('btn-spk').textContent = ttsOn ? '🔊' : '🔇';
  if (!ttsOn) { window.speechSynthesis.cancel(); orb.className = 'idle'; setStatus('Voz desactivada'); }
});

// ── Voice picker ──────────────────────────────────────
function populateVoices() {
  const sel = $('voice-select');
  const current = sel.value;
  sel.innerHTML = '';
  const vv = window.speechSynthesis.getVoices().filter(v=>v.lang.toLowerCase().startsWith('es'));
  vv.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name; opt.textContent = `${v.name} (${v.lang})${v.localService ? '' : ' ☁️'}`;
    sel.appendChild(opt);
  });
  const target = savedVoiceName || current;
  if (target && vv.some(v=>v.name===target)) sel.value = target;
}
if (window.speechSynthesis?.onvoiceschanged !== undefined)
  window.speechSynthesis.onvoiceschanged = populateVoices;
populateVoices();

$('voice-pitch').value = savedPitch;
$('voice-pitch-val').textContent = savedPitch.toFixed(2);
$('voice-pitch').addEventListener('input', () => {
  $('voice-pitch-val').textContent = parseFloat($('voice-pitch').value).toFixed(2);
});

$('btn-voice').addEventListener('click', () => {
  populateVoices();
  $('voice-modal').classList.add('show');
});
$('voice-modal').addEventListener('click', e => {
  if (e.target.id === 'voice-modal') $('voice-modal').classList.remove('show');
});
$('btn-voice-test').addEventListener('click', () => {
  const vv = window.speechSynthesis.getVoices();
  const v = vv.find(v=>v.name===$('voice-select').value);
  speak('Hola Alexandre, soy JARVIS. Así sonaré a partir de ahora.', { voice: v, pitch: parseFloat($('voice-pitch').value) });
});
$('btn-voice-save').addEventListener('click', () => {
  savedVoiceName = $('voice-select').value;
  savedPitch = parseFloat($('voice-pitch').value);
  localStorage.setItem('jarvis_voice_name', savedVoiceName);
  localStorage.setItem('jarvis_voice_pitch', savedPitch);
  $('voice-modal').classList.remove('show');
});

// ── STT ──────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null;
if (!SR) {
  $('no-speech').style.display = 'block';
  orb.style.opacity = '.35'; orb.style.cursor = 'default';
} else {
  rec = new SR();
  rec.lang = 'es-ES'; rec.interimResults = true; rec.continuous = false;

  rec.onstart = () => {
    isListening = true; orb.className = 'listening';
    setStatus('Escuchando…', 'listening');
    window.speechSynthesis.cancel();
  };
  rec.onresult = e => {
    const t = Array.from(e.results).map(r=>r[0].transcript).join('');
    if (e.results[e.results.length-1].isFinal) {
      stopRec(); setReply('«' + t + '»'); ask(t);
    } else {
      setStatus(t, 'listening');
    }
  };
  rec.onerror = e => {
    if (e.error !== 'no-speech') setStatus('⚠️ ' + e.error);
    stopRec();
  };
  rec.onend = () => { if (isListening) stopRec(); };

  orb.addEventListener('click', () => {
    if (isListening) { rec.stop(); return; }
    if (orb.classList.contains('speaking')) { window.speechSynthesis.cancel(); return; }
    setReply(''); $('text-in').value = '';
    try { rec.start(); } catch(e) { setStatus('⚠️ Sin micrófono'); }
  });
}

function stopRec() {
  isListening = false; orb.className = 'idle';
  setStatus('Pulsa el orbe y habla');
}

// ── Text fallback ─────────────────────────────────────
function sendText() {
  const t = $('text-in').value.trim(); if (!t) return;
  $('text-in').value = ''; setReply('«' + t + '»'); ask(t);
}
$('btn-send').addEventListener('click', sendText);
$('text-in').addEventListener('keydown', e => { if(e.key==='Enter') sendText(); });
</script>
</body>
</html>
