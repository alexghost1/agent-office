version: "3.8"

services:
  oficina:
    build: .
    container_name: agent-office
    ports:
      - "8080:8080"
    volumes:
      - ./chroma_data:/app/chroma_data
      - ./data:/app/data
      - ./.env:/app/.env:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/agents"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
